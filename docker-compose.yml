version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: safety_postgres
    environment:
      POSTGRES_USER: safety_user
      POSTGRES_PASSWORD: safety_password_dev
      POSTGRES_DB: industrial_safety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety_user -d industrial_safety"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safety_network

  redis:
    image: redis:7-alpine
    container_name: safety_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password_dev
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - safety_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safety_backend
    environment:
      DATABASE_URL: postgresql://safety_user:safety_password_dev@postgres:5432/industrial_safety
      REDIS_URL: redis://:redis_password_dev@redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-test}
      DEBUG: "False"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - safety_network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safety_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      NODE_ENV: development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - safety_network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  safety_network:
    driver: bridge
